<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 { font-size: 16px; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 8px 10px;
      background: #2a2a3e;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
    }
    input[type="range"] { width: 100%; accent-color: #4f46e5; }
    .row { display: flex; align-items: center; gap: 8px; }
    .row span { min-width: 30px; text-align: right; font-size: 12px; color: #9ca3af; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #374151;
      border-radius: 22px;
      transition: 0.3s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: #4f46e5; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
    button.primary {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button.primary:hover { background: #4338ca; }
    button.secondary {
      width: 100%;
      padding: 8px;
      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
    }
    #status { color: #6ee7b7; font-size: 12px; margin-top: 8px; text-align: center; }
    hr { border: none; border-top: 1px solid #333; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Narou Translator</h1>

  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza...">
  </div>

  <div class="field">
    <label>모델</label>
    <select id="model">
      <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
      <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
    </select>
  </div>

  <div class="field">
    <label>Temperature</label>
    <div class="row">
      <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.3">
      <span id="tempValue">0.3</span>
    </div>
  </div>

  <hr>

  <div class="toggle-row">
    <label style="margin:0">페이지 열 때 자동 번역</label>
    <label class="toggle">
      <input type="checkbox" id="autoTranslate">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <hr>

  <button class="primary" id="saveBtn">설정 저장</button>
  <button class="secondary" id="clearCacheBtn">번역 캐시 전체 삭제</button>
  <button class="secondary" id="optionsBtn">용어집 관리</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
